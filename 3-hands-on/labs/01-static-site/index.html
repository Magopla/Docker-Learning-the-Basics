<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Docker Learning Lab</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #dff3ff, transparent 35%),
          linear-gradient(135deg, #f7fbff, #eef4f7);
        color: #16324f;
      }

      main {
        width: min(680px, calc(100% - 3rem));
        padding: 2rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(22, 50, 79, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 6vw, 3.2rem);
      }

      p {
        line-height: 1.6;
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        background: #e7f1f8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Docker Static Site Lab</h1>
      <p>
        If you can see this page through an Nginx container, your bind mount and
        port mapping are working.
      </p>
      <p>
        Try editing this file while the container is running, then refresh the
        browser to see the change appear immediately.
      </p>
      <p><code>docker run -d -p 8080:80 -v ... nginx:alpine</code></p>
    </main>
  </body>
</html>
