services:
  postgres:
    image: postgres:16-alpine
    container_name: de-league-postgres
    environment:
      POSTGRES_DB: league
      POSTGRES_USER: league_user
      POSTGRES_PASSWORD: league_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league_user -d league"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - league_state_data:/var/lib/postgresql/data

  webapp:
    build: .
    container_name: de-learning-webapp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_NAME: data-engineering-league-simulator
      APP_VERSION: 0.3.0
      DATABASE_URL: postgresql+psycopg://league_user:league_password@postgres:5432/league
    ports:
      - "8000:8000"

volumes:
  league_state_data:
